<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hexagon Vocabulary & Grammar</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div id="top-right-controls">
            <div id="checkin-display" onclick="openCalendarModal()">
                <span>🔥 打卡</span>
                <span id="streak-count">0</span>
            </div>
            <div id="global-token-display">
                <span>代幣</span>
                <span id="global-token-count">0</span>
            </div>
        </div>

        <div id="main-content">
            <div id="view-vocabulary" class="view active">
                <div id="storage-area"></div>
                <canvas id="hex-canvas"></canvas>
                <div id="play-btn-container">
                    <button id="play-btn">Play</button>
                </div>
            </div>

            <div id="practice-modal">
                <div class="practice-header">
                    <div class="practice-title" id="practice-progress">進度: 0/0</div>
                    <button class="speed-btn" id="speed-toggle" onclick="toggleSpeed()">語速: 正常</button>
                </div>

                <div class="word-display" id="practice-word-card">
                    <div class="word-text" id="p-word"></div>
                    <div class="word-phonetic" id="p-phonetic"></div>

                    <div class="info-section">
                        <div class="info-label">詞性 (POS)</div>
                        <div class="info-content" id="p-pos"></div>
                        <div class="info-label">詞形變化</div>
                        <div class="info-content" id="p-morph"></div>
                        <div class="info-label">A1 例句</div>
                        <div class="info-content" id="p-sentence"></div>
                        <div class="info-label">字源 (Etymology)</div>
                        <div class="info-content" id="p-etymology"></div>
                    </div>
                </div>

                <div class="action-area">
                    <div class="tts-group">
                        <button class="tts-btn" onclick="speakText(currentWordData.word)">聽單字</button>
                        <button class="tts-btn" onclick="speakText(currentWordData.sentence)">聽例句</button>
                        <button class="tts-btn" onclick="speakText(currentWordData.etymology)">聽字源</button>
                    </div>

                    <div id="recognition-feedback">請點擊麥克風發音</div>

                    <div class="mic-skip-group">
                        <button id="mic-btn" onclick="toggleMic()">收音</button>
                        <button id="skip-btn" onclick="skipWord()">跳過</button>
                    </div>

                    <button id="next-word-btn" onclick="moveToNextWord()">下一題</button>
                </div>
            </div>

            <div id="calendar-modal">
                <div class="calendar-content">
                    <div class="calendar-header">
                        <span id="calendar-month">2026年 6月</span>
                        <span class="close-cal" onclick="closeCalendarModal()">×</span>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
            </div>

            <div id="view-grammar" class="view">
                <div class="page-header">文法 (WALS)</div>
                <div id="grammar-content">
                    <div class="section-title">A1 基礎規則</div>
                    <div class="rule-list" id="rule-list"></div>
                </div>
            </div>

            <div id="view-settings" class="view">
                <div class="page-header">設定 (Settings)</div>
                <div class="settings-container">
                    <div class="settings-card">
                        <div class="settings-title">帳號與雲端同步</div>
                        <div class="settings-row">
                            <button id="loginBtn" class="action-btn btn-unlock">使用 Google 登入</button>
                            <button id="logoutBtn" class="action-btn btn-disabled" style="display:none;">登出</button>
                            <div id="user-info" style="font-size:14px; color:var(--text-secondary); margin-top:8px;">未登入 (進度僅儲存於本機)</div>
                            <div id="sync-status" style="font-size:12px; color:var(--accent-color); margin-top:4px;"></div>
                        </div>
                    </div>

                    <div class="settings-card">
                        <div class="settings-title">存檔管理 (Save Slots)</div>
                        <div class="settings-row">
                            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                                <input type="text" id="new-save-input" placeholder="輸入存檔名稱 (如：中文、英文)" style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px;">
                                <button id="add-save-btn" class="action-btn btn-view">新增</button>
                            </div>
                            <div id="save-slot-list" style="display: flex; flex-direction: column; gap: 8px;">
                            </div>
                        </div>
                    </div>

                    <div class="settings-card">
                        <div class="settings-title">我的單字庫 (Datasets)</div>
                        <div class="settings-row" id="dataset-list"></div>
                    </div>

                    <div class="settings-card">
                        <div class="settings-title">新增單字庫 (匯入 CSV)</div>
                        <div class="settings-row">
                            <div style="font-size:14px; color:var(--text-secondary); line-height:1.4;">
                                CSV 格式需包含：Word, Phonetic, POS, Morphological, Sentence, Etymology。
                            </div>
                            <div class="file-input-wrapper">
                                <button class="action-btn btn-view" style="width:100%;">選擇 CSV 檔案</button>
                                <input type="file" id="csvUpload" accept=".csv">
                            </div>
                            <div id="csv-filename" style="font-size:14px; color:var(--text-main);">尚未選擇檔案</div>
                            <button id="importCsvBtn" class="action-btn btn-unlock" style="margin-top:10px;">上傳並匯入</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="toast">操作無效</div>
        </div>

        <div id="bottom-nav">
            <div class="nav-tab" data-target="view-grammar">文法</div>
            <div class="nav-tab active" data-target="view-vocabulary">單字</div>
            <div class="nav-tab" data-target="view-settings">設定</div>
        </div>
    </div>

    <script src="js/state.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/grammar.js"></script>
    <script src="js/datasets.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/saves.js"></script>
    <script src="js/practice.js"></script>
    <script src="js/events.js"></script>
    <script src="js/firebase.js"></script>
</body>
</html>
