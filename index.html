<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hexagon Vocabulary</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --hex-border: #d1d1d6;
            --hex-fill: #ffffff;
            --hex-active: #007aff;
            --text-color: #1d1d1f;
            --nav-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        #main-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .view {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .view.active {
            display: flex;
        }

        /* 頂部存放區 */
        #storage-area {
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #e5e5ea;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .storage-item {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #e5e5ea;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: var(--text-color);
            flex-shrink: 0;
        }

        /* 無限畫布 */
        #hex-canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            /* 讓 JS 處理所有觸控 */
        }

        /* 中下方 Play 鍵 */
        #play-btn-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        #play-btn {
            background-color: #34c759;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);
            cursor: pointer;
        }

        #play-btn:active {
            transform: scale(0.95);
        }

        /* 底部導覽列 */
        #bottom-nav {
            height: 80px;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e5e5ea;
            padding-bottom: env(safe-area-inset-bottom);
            /* 適應瀏海螢幕底部 */
        }

        .nav-tab {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 16px;
            color: #8e8e93;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-tab.active {
            color: var(--hex-active);
            font-weight: bold;
        }

        /* 空白頁面樣式 */
        .placeholder-text {
            margin: auto;
            font-size: 20px;
            color: #8e8e93;
        }

        /* 視覺回饋提示 */
        #toast {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="main-content">
            <!-- 單字視圖 (預設) -->
            <div id="view-vocabulary" class="view active">
                <div id="storage-area"></div>
                <canvas id="hex-canvas"></canvas>
                <div id="play-btn-container">
                    <button id="play-btn">Play</button>
                </div>
                <div id="toast">操作無效</div>
            </div>

            <!-- 文法視圖 -->
            <div id="view-grammar" class="view">
                <div class="placeholder-text">文法頁面 (建置中)</div>
            </div>

            <!-- 設定視圖 -->
            <div id="view-settings" class="view">
                <div class="placeholder-text">設定頁面 (建置中)</div>
            </div>
        </div>

        <!-- 底部導覽列 -->
        <div id="bottom-nav">
            <div class="nav-tab" data-target="view-grammar">文法</div>
            <div class="nav-tab active" data-target="view-vocabulary">單字</div>
            <div class="nav-tab" data-target="view-settings">設定</div>
        </div>
    </div>

    <script>
        // --- 狀態與資料 ---
        // 代號現在帶有等級屬性，預設為 1
        const storage = Array.from({ length: 10 }, (_, i) => ({ code: i, level: 1 }));
        const grid = new Map(); // key: "q,r", value: { code, level }
        const HEX_SIZE = 40;

        // 攝影機控制 (平移與縮放)
        let camera = { x: 0, y: 0, zoom: 1 };

        // --- 數學與座標轉換 (尖頂六角形 Axial Coordinates) ---
        const sqrt3 = Math.sqrt(3);

        function axialToPixel(q, r) {
            const x = HEX_SIZE * sqrt3 * (q + r / 2);
            const y = HEX_SIZE * 3 / 2 * r;
            return { x, y };
        }

        function pixelToAxial(px, py) {
            const q = (sqrt3 / 3 * px - 1 / 3 * py) / HEX_SIZE;
            const r = (2 / 3 * py) / HEX_SIZE;
            return axialRound(q, r);
        }

        function axialRound(q, r) {
            const s = -q - r;
            let rq = Math.round(q);
            let rr = Math.round(r);
            let rs = Math.round(s);
            const qDiff = Math.abs(rq - q);
            const rDiff = Math.abs(rr - r);
            const sDiff = Math.abs(rs - s);
            if (qDiff > rDiff && qDiff > sDiff) rq = -rr - rs;
            else if (rDiff > sDiff) rr = -rq - rs;
            return { q: rq, r: rr };
        }

        const neighborDirs = [
            { q: 1, r: 0 }, { q: 1, r: -1 }, { q: 0, r: -1 },
            { q: -1, r: 0 }, { q: -1, r: 1 }, { q: 0, r: 1 }
        ];

        // --- 圖論邏輯 ---
        function hasAdjacent(q, r) {
            for (let dir of neighborDirs) {
                if (grid.has(`${q + dir.q},${r + dir.r}`)) return true;
            }
            return false;
        }

        function isConnectedAfterRemoval(q, r) {
            if (grid.size <= 1) return true;

            const targetKey = `${q},${r}`;
            let startNode = null;

            for (let key of grid.keys()) {
                if (key !== targetKey) {
                    startNode = key;
                    break;
                }
            }
            if (!startNode) return true;

            const visited = new Set();
            const queue = [startNode];
            visited.add(startNode);

            while (queue.length > 0) {
                const current = queue.shift();
                const [cq, cr] = current.split(',').map(Number);

                for (let dir of neighborDirs) {
                    const nKey = `${cq + dir.q},${cr + dir.r}`;
                    if (nKey !== targetKey && grid.has(nKey) && !visited.has(nKey)) {
                        visited.add(nKey);
                        queue.push(nKey);
                    }
                }
            }
            return visited.size === grid.size - 1;
        }

        // --- DOM 更新 ---
        const storageArea = document.getElementById('storage-area');
        const toast = document.getElementById('toast');

        function updateStorageUI() {
            storageArea.innerHTML = '';
            storage.forEach(item => {
                const div = document.createElement('div');
                div.className = 'storage-item';
                div.textContent = item.code;
                storageArea.appendChild(div);
            });
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 1500);
        }

        // --- Canvas 渲染 ---
        const canvas = document.getElementById('hex-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.parentElement.clientWidth;
            height = canvas.parentElement.clientHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            if (camera.x === 0 && camera.y === 0) {
                camera.x = width / 2;
                camera.y = height / 2;
            }
            draw();
        }

        // 繪製背景底格
        function drawHexBackground(x, y, radius) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = Math.PI / 3 * i - Math.PI / 6;
                const px = x + radius * Math.cos(angle);
                const py = y + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.strokeStyle = '#ebebeb';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 繪製已放置的同心六角形與代號
        function drawPlacedHex(x, y, radius, item) {
            const step = 6; // 同心環縮小間距

            // 先塗白底避免背景線條穿透
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = Math.PI / 3 * i - Math.PI / 6;
                const px = x + radius * Math.cos(angle);
                const py = y + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            // 依等級繪製同心環
            ctx.strokeStyle = '#007aff';
            ctx.lineWidth = 2;
            for (let l = 0; l < item.level; l++) {
                const currentRadius = radius - l * step;
                if (currentRadius <= 0) break;

                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = Math.PI / 3 * i - Math.PI / 6;
                    const px = x + currentRadius * Math.cos(angle);
                    const py = y + currentRadius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
            }

            // 繪製代號文字
            ctx.fillStyle = '#1d1d1f';
            ctx.font = 'bold 22px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(item.code.toString(), x, y);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            ctx.save();
            ctx.translate(camera.x, camera.y);
            ctx.scale(camera.zoom, camera.zoom);

            const viewRadius = Math.max(width, height) / camera.zoom / HEX_SIZE;
            const centerAxial = pixelToAxial(-camera.x / camera.zoom, -camera.y / camera.zoom);

            const range = Math.ceil(viewRadius);
            for (let q = centerAxial.q - range; q <= centerAxial.q + range; q++) {
                for (let r = centerAxial.r - range; r <= centerAxial.r + range; r++) {
                    const pos = axialToPixel(q, r);
                    drawHexBackground(pos.x, pos.y, HEX_SIZE);
                }
            }

            for (let [key, item] of grid.entries()) {
                const [q, r] = key.split(',').map(Number);
                const pos = axialToPixel(q, r);
                drawPlacedHex(pos.x, pos.y, HEX_SIZE, item);
            }

            ctx.restore();
        }

        // --- 互動控制 ---
        let isDragging = false;
        let dragMoved = false;
        let lastPos = { x: 0, y: 0 };
        let initialPinchDist = null;
        let initialZoom = 1;

        function getPinchDist(e) {
            if (e.touches.length < 2) return 0;
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                dragMoved = false;
                lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2) {
                isDragging = false;
                initialPinchDist = getPinchDist(e);
                initialZoom = camera.zoom;
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging && e.touches.length === 1) {
                const dx = e.touches[0].clientX - lastPos.x;
                const dy = e.touches[0].clientY - lastPos.y;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;

                camera.x += dx;
                camera.y += dy;
                lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                draw();
            } else if (e.touches.length === 2 && initialPinchDist) {
                const dist = getPinchDist(e);
                const scale = dist / initialPinchDist;
                camera.zoom = Math.min(Math.max(initialZoom * scale, 0.5), 3);
                draw();
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (isDragging && !dragMoved && e.changedTouches.length === 1) {
                handleCanvasClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }
            isDragging = false;
            initialPinchDist = null;
        });

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragMoved = false;
            lastPos = { x: e.clientX, y: e.clientY };
        });
        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastPos.x;
            const dy = e.clientY - lastPos.y;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
            camera.x += dx;
            camera.y += dy;
            lastPos = { x: e.clientX, y: e.clientY };
            draw();
        });
        canvas.addEventListener('mouseup', (e) => {
            if (isDragging && !dragMoved) {
                handleCanvasClick(e.clientX, e.clientY);
            }
            isDragging = false;
        });
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomDelta = e.deltaY > 0 ? 0.9 : 1.1;
            camera.zoom = Math.min(Math.max(camera.zoom * zoomDelta, 0.5), 3);
            draw();
        }, { passive: false });

        function handleCanvasClick(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const localX = (clientX - rect.left - camera.x) / camera.zoom;
            const localY = (clientY - rect.top - camera.y) / camera.zoom;

            const axial = pixelToAxial(localX, localY);
            const key = `${axial.q},${axial.r}`;

            if (grid.has(key)) {
                if (!isConnectedAfterRemoval(axial.q, axial.r)) {
                    showToast('移除此方塊會造成斷裂');
                    return;
                }
                const item = grid.get(key);
                grid.delete(key);
                storage.push(item);
            } else {
                if (storage.length === 0) {
                    showToast('無可用代號');
                    return;
                }
                if (grid.size > 0 && !hasAdjacent(axial.q, axial.r)) {
                    showToast('必須放置於相鄰位置');
                    return;
                }
                const item = storage.shift();
                grid.set(key, item);
            }

            updateStorageUI();
            draw();
        }

        // --- Play 升級邏輯 ---
        document.getElementById('play-btn').addEventListener('click', () => {
            const upgradeableKeys = [];

            for (let [key, item] of grid.entries()) {
                if (item.level < 5) {
                    upgradeableKeys.push(key);
                }
            }

            if (upgradeableKeys.length === 0) {
                showToast('畫面中沒有可升級的代號');
                return;
            }

            const randomKey = upgradeableKeys[Math.floor(Math.random() * upgradeableKeys.length)];
            const item = grid.get(randomKey);

            item.level += 1;
            grid.set(randomKey, item);

            showToast(`代號 ${item.code} 已升至等級 ${item.level}`);
            draw();
        });

        // --- 分頁切換 ---
        const tabs = document.querySelectorAll('.nav-tab');
        const views = document.querySelectorAll('.view');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                views.forEach(v => v.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.add('active');

                if (tab.dataset.target === 'view-vocabulary') {
                    resize();
                }
            });
        });

        // --- 初始化 ---
        window.addEventListener('resize', resize);
        updateStorageUI();
        resize();
    </script>
</body>

</html>
